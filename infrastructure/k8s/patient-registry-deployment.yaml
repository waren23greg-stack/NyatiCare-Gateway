apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-registry
  namespace: nyaticare-gateway
spec:
  replicas: 3
  selector:
    matchLabels: { app: patient-registry }
  template:
    metadata:
      labels: { app: patient-registry }
    spec:
      containers:
        - name: patient-registry
          image: ghcr.io/your-org/nyaticare/patient-registry:latest
          ports:
            - containerPort: 4003
          envFrom:
            - secretRef: { name: nyaticare-patient-secret }
          readinessProbe:
            httpGet: { path: /api/v1/health-check, port: 4003 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: patient-registry
  namespace: nyaticare-gateway
spec:
  selector: { app: patient-registry }
  ports:
    - port: 4003
      targetPort: 4003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: patient-registry-hpa
  namespace: nyaticare-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: patient-registry
  minReplicas: 3
  maxReplicas: 25
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
