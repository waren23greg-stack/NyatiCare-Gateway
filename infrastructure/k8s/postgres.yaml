apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: nyaticare-gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: nyaticare-db-secret, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: nyaticare-db-secret, key: password } }
            - name: POSTGRES_DB
              value: nyaticare_gateway
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: nyaticare-gateway
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nyaticare-gateway
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
