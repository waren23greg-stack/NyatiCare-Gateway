services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nyaticare
      POSTGRES_PASSWORD: nyaticare
      POSTGRES_DB: nyaticare_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../packages/database/migrations:/docker-entrypoint-initdb.d
      - ../packages/database/seed/seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyaticare"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/api/v1/health-check', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
  claims-ingestion:
    build:
      context: ..
      dockerfile: apps/claims-ingestion/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4002:4002"
    volumes:
      - claims_offline_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/api/v1/health-check', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
  patient-registry:
    build:
      context: ..
      dockerfile: apps/patient-registry/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4003:4003"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4003/api/v1/health-check', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
  ussd-gateway:
    build:
      context: ..
      dockerfile: apps/ussd-gateway/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "4004:4004"
    depends_on:
      auth-service:
        condition: service_healthy
      patient-registry:
        condition: service_healthy
volumes:
  postgres_data:
  claims_offline_data:
